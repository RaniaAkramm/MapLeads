<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siwet MapLeads | Real Business Finder with Live Map</title>
    <!-- SEO Meta -->
    <meta name="description" content="Siwet MapLeads - Real business search & leads from OpenStreetMap. Find restaurants, shops, services worldwide with interactive map.">
    <meta name="keywords" content="business finder, real leads, map leads, siwet, local business, B2B leads, خريطة أعمال, بحث حقيقي, Firmensuche, recherche d'entreprise, 事業検索, 企业搜索">
    <meta name="author" content="Siwet MapLeads">
    <!-- Leaflet + CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0,229,255,0.4);
            --bg-dark: #050a12;
            --card-bg: #0f172ad9;
            --card-solid: #111827;
            --border-glow: #1e2a3e;
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
            --whatsapp: #25D366;
            --website: #8b5cf6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
            color: var(--text-light);
            padding: 20px 24px 40px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 20px;
            border-bottom: 1px solid rgba(0,229,255,0.25);
            padding-bottom: 18px;
        }
        .logo h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.8rem; color: var(--text-dim); }
        .lang-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(6px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #2d3a4e;
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .lang-btn.active, .lang-btn:hover { background: var(--accent); color: #03060c; box-shadow: 0 0 8px var(--accent);}
        .search-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 28px;
            margin-bottom: 28px;
            border: 1px solid var(--border-glow);
        }
        .search-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
        .input-group { flex: 1; min-width: 200px; }
        .input-group label { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 6px; color: var(--accent); }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); }
        button.primary-btn {
            background: linear-gradient(95deg, var(--accent), #00b8d4);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            color: #03060c;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .map-container { border-radius: 28px; overflow: hidden; margin-bottom: 32px; height: 400px; border: 1px solid #2a3c54; }
        #map { height: 100%; width: 100%; background: #111827; }
        .results-header { display: flex; justify-content: space-between; margin: 24px 0 16px; flex-wrap: wrap; }
        .results-count { background: #1e293b; padding: 5px 14px; border-radius: 30px; font-size: 0.85rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 12px; }
        .card {
            background: var(--card-solid);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #253449;
            transition: 0.25s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { font-size: 1.3rem; margin-bottom: 12px; display: flex; gap: 8px; }
        .card p { color: var(--text-dim); margin-bottom: 15px; display: flex; gap: 6px; align-items: center; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-wa, .btn-web { padding: 8px 16px; border-radius: 40px; text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-wa { background: var(--whatsapp); color: #0a0f1c; }
        .btn-web { background: var(--website); color: white; }
        .loading { text-align: center; padding: 40px; display: none; }
        .spinner { width: 45px; height: 45px; border: 4px solid #2d3a5e; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .domain-ad {
            margin-top: 48px;
            text-align: center;
            background: linear-gradient(120deg, #0f172a, #030712);
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid #2d4a6e;
        }
        .domain-ad a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .footer-credit { text-align: center; margin-top: 28px; font-size: 0.75rem; color: #4b5568; }
        i { margin-right: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-map-marked-alt"></i> Siwet MapLeads</h1>
            <p data-i18n="tagline">Real Business Data | Live from OpenStreetMap</p>
        </div>
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
            <button class="lang-btn" data-lang="ar">🇸🇦 عربي</button>
            <button class="lang-btn" data-lang="de">🇩🇪 DE</button>
            <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
            <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
            <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
        </div>
    </div>

    <div class="search-card">
        <div class="search-row">
            <div class="input-group">
                <label data-i18n="locationLabel"><i class="fas fa-city"></i> Location (City/Country)</label>
                <input type="text" id="locationInput" placeholder="e.g., Dubai, Paris, Tokyo" value="Dubai">
            </div>
            <div class="input-group">
                <label data-i18n="keywordLabel"><i class="fas fa-briefcase"></i> Business Keyword</label>
                <input type="text" id="keywordInput" placeholder="e.g., Restaurant, Clinic, Hotel" value="Restaurant">
            </div>
        </div>
        <button class="primary-btn" id="searchBtn"><i class="fas fa-search-location"></i> <span data-i18n="searchBtn">Search Real Leads & Map</span></button>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div data-i18n="loadingMsg">Fetching real businesses from OpenStreetMap...</div>
    </div>
    <div class="results-header">
        <h3 data-i18n="resultsTitle"><i class="fas fa-chart-line"></i> Live Business Leads</h3>
        <div class="results-count" id="resultCount">0 businesses</div>
    </div>
    <div class="grid" id="resultsGrid"></div>

    <div class="domain-ad">
        <i class="fas fa-tag"></i> <strong>🔥 Siwet.com</strong> <span data-i18n="adText">Premium domain for sale on</span> 
        <a href="https://www.godaddy.com/domainsearch/find?checkAvail=1&domainToCheck=siwet.com" target="_blank">GoDaddy Auctions</a> 
        <span data-i18n="adCta">— Own this brand today!</span>
    </div>
    <div class="footer-credit">
        <i class="fas fa-database"></i> Real data: OpenStreetMap | <span data-i18n="credit">Siwet MapLeads Pro</span>
    </div>
</div>

<script>
    // ---------- MULTI-LANGUAGE ----------
    const translations = {
        en: { tagline:"Real Business Data | Live from OSM", locationLabel:"📍 Location (City/Country)", keywordLabel:"🔍 Business Keyword", searchBtn:"Search Real Leads & Map", loadingMsg:"Fetching real businesses from OpenStreetMap...", resultsTitle:"Live Business Leads", adText:"Premium domain for sale on", adCta:"— Own this brand today!", credit:"Powered by OpenStreetMap", noResults:"No real businesses found. Try another keyword or location." },
        ar: { tagline:"بيانات حقيقية للأعمال | مباشر من OSM", locationLabel:"📍 الموقع (مدينة/دولة)", keywordLabel:"🔍 كلمة البحث (نشاط تجاري)", searchBtn:"بحث حقيقي عن عملاء وخريطة", loadingMsg:"جلب بيانات حقيقية من OpenStreetMap...", resultsTitle:"قادة الأعمال المباشرون", adText:"نطاق مميز للبيع على", adCta:"— امتلك هذه العلامة اليوم!", credit:"مدعوم من OpenStreetMap", noResults:"لم يتم العثور على أعمال حقيقية. جرب كلمة أخرى." },
        de: { tagline:"Echte Firmendaten | Live von OSM", locationLabel:"📍 Standort (Stadt/Land)", keywordLabel:"🔍 Geschäftsbereich", searchBtn:"Echte Leads & Karte durchsuchen", loadingMsg:"Rufe echte Unternehmen von OpenStreetMap ab...", resultsTitle:"Echtzeit-Leads", adText:"Premium-Domain zu verkaufen auf", adCta:"— Sichern Sie sich diese Marke!", credit:"Betrieben mit OpenStreetMap", noResults:"Keine echten Unternehmen gefunden. Versuchen Sie ein anderes Keyword." },
        fr: { tagline:"Données réelles | OpenStreetMap", locationLabel:"📍 Lieu (Ville/Pays)", keywordLabel:"🔍 Mot-clé métier", searchBtn:"Rechercher leads réels", loadingMsg:"Récupération des données OpenStreetMap...", resultsTitle:"Leads réels", adText:"Domaine premium en vente sur", adCta:"— Possédez cette marque!", credit:"Propulsé par OpenStreetMap", noResults:"Aucune entreprise réelle trouvée. Essayez un autre mot-clé." },
        ja: { tagline:"実店舗データ | OSMライブ", locationLabel:"📍 場所 (都市/国)", keywordLabel:"🔍 ビジネスキーワード", searchBtn:"実際のリードを検索", loadingMsg:"OpenStreetMapから実際のビジネスを取得中...", resultsTitle:"リアルリード", adText:"プレミアムドメイン販売", adCta:"— このブランドを入手！", credit:"OpenStreetMap 提供", noResults:"実際の事業所が見つかりません。別のキーワードを試してください。" },
        zh: { tagline:"真实商业数据 | 来自OSM", locationLabel:"📍 位置 (城市/国家)", keywordLabel:"🔍 商业关键词", searchBtn:"搜索真实线索与地图", loadingMsg:"从OpenStreetMap获取真实商家...", resultsTitle:"实时商业线索", adText:"优质域名出售", adCta:"— 拥有这个品牌！", credit:"由OpenStreetMap驱动", noResults:"未找到真实商家。请尝试其他关键词。" }
    };
    let currentLang = "en";
    function updateUI(lang) {
        const t = translations[lang];
        if(!t) return;
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if(t[key]) el.innerHTML = t[key];
        });
        document.getElementById("locationInput").placeholder = lang==="ar"?"مثال: دبي، لندن":(lang==="de"?"z.B. Dubai, Berlin":"e.g. Dubai, Paris");
        document.getElementById("keywordInput").placeholder = lang==="ar"?"مثال: مطعم، عيادة":(lang==="de"?"z.B. Restaurant, Klinik":"e.g. Restaurant, Clinic");
    }
    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            currentLang = btn.getAttribute("data-lang");
            updateUI(currentLang);
        });
    });
    updateUI("en");

    // ---------- MAP INIT ----------
    let map = L.map('map').setView([25.2048, 55.2708], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM & CartoDB', subdomains:'abcd', maxZoom:19 }).addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    // Helper: clear results
    function clearResults() {
        markersLayer.clearLayers();
        document.getElementById("resultsGrid").innerHTML = "";
        document.getElementById("resultCount").innerHTML = "0 businesses";
    }

    // Geocode location (Nominatim)
    async function geocodeLocation(locationName) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationName)}&limit=1`;
        const resp = await fetch(url, { headers: { 'User-Agent': 'SiwetMapLeads/1.0' } });
        const data = await resp.json();
        if(data && data.length) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
        throw new Error("Location not found");
    }

    // Overpass API: real business search by keyword + bounding box
    async function fetchRealBusinesses(keyword, bbox) {
        // bbox: [south, west, north, east] or [minLat, minLon, maxLat, maxLon]
        const [south, west, north, east] = bbox;
        // Query: find nodes/ways with any tag 'name' containing keyword (case-insensitive) OR amenity/shop like keyword
        // More robust: search for 'name' ~ keyword (regex) or 'shop'~keyword / 'amenity'~keyword
        // Using regex in Overpass is heavy. Let's search for "name" approximately matching keyword + common tags.
        // For simplicity but real: search for any object where name ~ keyword (case-insensitive)
        const overpassQuery = `
            [out:json][timeout:60];
            (
                node["name"~"${keyword}" i](${south},${west},${north},${east});
                way["name"~"${keyword}" i](${south},${west},${north},${east});
                node["shop"~"${keyword}" i](${south},${west},${north},${east});
                way["shop"~"${keyword}" i](${south},${west},${north},${east});
                node["amenity"~"${keyword}" i](${south},${west},${north},${east});
                way["amenity"~"${keyword}" i](${south},${west},${north},${east});
            );
            out body center;
        `;
        const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;
        const response = await fetch(url);
        const data = await response.json();
        if(!data.elements) return [];
        // Convert to unified format
        const results = [];
        for(let el of data.elements) {
            let lat = el.lat || (el.center ? el.center.lat : null);
            let lon = el.lon || (el.center ? el.center.lon : null);
            if(!lat || !lon) continue;
            const tags = el.tags || {};
            const name = tags.name || "Unnamed Business";
            const address = tags["addr:street"] ? tags["addr:street"] : (tags["addr:full"] || "Address not specified");
            const phone = tags.phone || tags["contact:phone"] || null;
            const website = tags.website || tags.url || null;
            results.push({
                name: name,
                location: address || `${lat.toFixed(5)}, ${lon.toFixed(5)}`,
                phone: phone,
                website: website,
                lat: lat,
                lng: lon
            });
        }
        // Remove duplicates by name+location
        const unique = [];
        const seen = new Set();
        for(let b of results) {
            const key = b.name + b.location;
            if(!seen.has(key)) { seen.add(key); unique.push(b); }
        }
        return unique.slice(0, 200); // max 200
    }

    // Render businesses on map & grid
    function renderBusinesses(businesses, centerCoords) {
        const grid = document.getElementById("resultsGrid");
        if(!businesses.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">${translations[currentLang].noResults}</div>`;
            document.getElementById("resultCount").innerText = `0 ${translations[currentLang]?.resultsTitle || "businesses"}`;
            return;
        }
        document.getElementById("resultCount").innerHTML = `${businesses.length} ${currentLang === 'ar' ? 'شركة حقيقية' : 'real businesses found'}`;
        grid.innerHTML = businesses.map(b => `
            <div class="card">
                <h3><i class="fas fa-store"></i> ${escapeHtml(b.name)}</h3>
                <p><i class="fas fa-map-pin"></i> ${escapeHtml(b.location)}</p>
                <div class="actions">
                    ${b.phone ? `<a href="https://wa.me/${b.phone.replace(/[^0-9]/g,'')}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>` : ''}
                    ${b.website ? `<a href="${b.website.startsWith('http')?b.website:'https://'+b.website}" target="_blank" class="btn-web"><i class="fas fa-globe"></i> Website</a>` : ''}
                </div>
            </div>
        `).join('');
        // Add markers and fit bounds
        const bounds = [];
        businesses.forEach(b => {
            if(b.lat && b.lng) {
                const marker = L.marker([b.lat, b.lng]).addTo(markersLayer);
                marker.bindPopup(`<b>${escapeHtml(b.name)}</b><br>📍 ${escapeHtml(b.location)}${b.phone ? `<br>📞 ${b.phone}` : ''}`);
                bounds.push([b.lat, b.lng]);
            }
        });
        if(bounds.length) map.fitBounds(bounds, { padding: [40,40] });
        else if(centerCoords) map.setView([centerCoords.lat, centerCoords.lon], 13);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Main search using REAL Overpass API
    async function performRealSearch() {
        const locationRaw = document.getElementById("locationInput").value.trim();
        const keyword = document.getElementById("keywordInput").value.trim();
        if(!locationRaw || !keyword) {
            alert("Please enter both location and keyword.");
            return;
        }
        const loadingDiv = document.getElementById("loading");
        const searchBtn = document.getElementById("searchBtn");
        loadingDiv.style.display = "block";
        searchBtn.disabled = true;
        clearResults();
        try {
            // 1. Get coordinates + bounding box of the location (expanded for better coverage)
            const geo = await geocodeLocation(locationRaw);
            // Expand bounding box: ~0.2 degrees (~20km) around point
            const delta = 0.2;
            const bbox = [geo.lat - delta, geo.lon - delta, geo.lat + delta, geo.lon + delta];
            // 2. Fetch real businesses from OSM
            const businesses = await fetchRealBusinesses(keyword, bbox);
            if(businesses.length === 0) {
                renderBusinesses([], geo);
            } else {
                renderBusinesses(businesses, geo);
            }
        } catch(err) {
            console.error(err);
            alert(`Error: ${err.message}. Please check location name or try a broader keyword.`);
            document.getElementById("resultsGrid").innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ ${err.message}</div>`;
        } finally {
            loadingDiv.style.display = "none";
            searchBtn.disabled = false;
        }
    }

    document.getElementById("searchBtn").addEventListener("click", performRealSearch);
    // Auto-load example on start
    window.addEventListener("load", () => setTimeout(performRealSearch, 300));
</script>
</body>
</html>
