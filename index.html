<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags (English & Arabic) -->
    <meta name="description" content="Siwet MapLeads - Find local businesses with emails, WhatsApp, and websites. Business lead generation tool. أداة توليد عملاء محتملين مع خرائط.">
    <meta name="keywords" content="map leads, business finder, lead generation, Google Maps scraping, Siwet MapLeads, أداة بحث عن الشركات, ايميلات, واتساب, خرائط, توليد عملاء, business emails, whatsapp numbers">
    <title>Siwet MapLeads | Professional Business Finder</title>
    
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #00e5ff;
            --bg: #070b14;
            --card: #0f172a;
            --card-border: #1e293b;
            --text: #e2e8f0;
            --btn-grad: linear-gradient(135deg, #00e5ff, #7c3aed);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.3s;
        }

        /* Pulse animation for the logo */
        @keyframes pulse {
            0% { text-shadow: 0 0 10px var(--accent); }
            50% { text-shadow: 0 0 25px var(--accent), 0 0 50px #7c3aed; }
            100% { text-shadow: 0 0 10px var(--accent); }
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 3s infinite;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .lang-switcher select {
            background: var(--card);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .ad-banner {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 1rem 0;
        }

        .ad-banner a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        .search-box {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            backdrop-filter: blur(10px);
        }

        .search-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0,229,255,0.3);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--btn-grad);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,229,255,0.4);
        }

        .map-results-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            z-index: 1;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .card p {
            margin: 0.4rem 0;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-web {
            background: #7c3aed;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .btn-email {
            background: #f59e0b;
            color: black;
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: var(--accent);
        }

        /* RTL support */
        body.rtl {
            direction: rtl;
            text-align: right;
        }

        body.rtl .card p {
            flex-direction: row-reverse;
        }

        @media (max-width: 600px) {
            .search-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ Siwet MapLeads</div>
            <div class="lang-switcher">
                <select id="langSelect" onchange="switchLanguage(this.value)">
                    <option value="en">🇬🇧 English</option>
                    <option value="ar">🇸🇦 العربية</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="zh">🇨🇳 中文</option>
                </select>
            </div>
        </div>

        <!-- Small Domain Sale Ad -->
        <div class="ad-banner">
            💎 <span data-i18n="ad_text">Own this domain?</span> 
            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=siwet.com" target="_blank" rel="nofollow">
                Siwet.com
            </a> 
            <span data-i18n="ad_sale">is available on GoDaddy</span>
        </div>

        <div class="search-box">
            <div class="search-row">
                <input type="text" id="location" data-i18n-placeholder="placeholder_location" placeholder="City or Country (e.g., Dubai)">
                <input type="text" id="keyword" data-i18n-placeholder="placeholder_keyword" placeholder="Keyword (e.g., Restaurants)">
            </div>
            <button class="btn-primary" onclick="searchLeads()" data-i18n="search_btn">🔍 Search Leads (Up to 200)</button>
        </div>

        <div id="loading" class="loading" style="display: none;" data-i18n="loading">Searching... please wait.</div>

        <div class="map-results-container">
            <div id="map"></div>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ---------- i18n Setup ----------
        const translations = {
            en: {
                ad_text: "Own this domain?",
                ad_sale: "is available on GoDaddy",
                placeholder_location: "City or Country (e.g., Dubai)",
                placeholder_keyword: "Keyword (e.g., Restaurants)",
                search_btn: "🔍 Search Leads (Up to 200)",
                loading: "Searching... please wait.",
                no_results: "No businesses found.",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "WhatsApp",
                website: "Website",
                email: "Email"
            },
            ar: {
                ad_text: "تمتلك هذا النطاق؟",
                ad_sale: "متاح على GoDaddy",
                placeholder_location: "المدينة أو الدولة (مثال: دبي)",
                placeholder_keyword: "كلمة مفتاحية (مثال: مطاعم)",
                search_btn: "🔍 بحث عن عملاء (حتى 200)",
                loading: "جاري البحث... الرجاء الانتظار.",
                no_results: "لم يتم العثور على شركات.",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "واتساب",
                website: "الموقع",
                email: "بريد"
            },
            de: {
                ad_text: "Diese Domain besitzen?",
                ad_sale: "verfügbar auf GoDaddy",
                placeholder_location: "Stadt oder Land (z.B. Dubai)",
                placeholder_keyword: "Stichwort (z.B. Restaurants)",
                search_btn: "🔍 Leads suchen (bis zu 200)",
                loading: "Suche... bitte warten.",
                no_results: "Keine Unternehmen gefunden.",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "WhatsApp",
                website: "Webseite",
                email: "E-Mail"
            },
            fr: {
                ad_text: "Posséder ce domaine ?",
                ad_sale: "disponible sur GoDaddy",
                placeholder_location: "Ville ou pays (ex: Dubaï)",
                placeholder_keyword: "Mot-clé (ex: Restaurants)",
                search_btn: "🔍 Rechercher des prospects (jusqu'à 200)",
                loading: "Recherche en cours... veuillez patienter.",
                no_results: "Aucune entreprise trouvée.",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "WhatsApp",
                website: "Site web",
                email: "E-mail"
            },
            ja: {
                ad_text: "このドメインを所有する？",
                ad_sale: "GoDaddyで利用可能",
                placeholder_location: "都市または国 (例: ドバイ)",
                placeholder_keyword: "キーワード (例: レストラン)",
                search_btn: "🔍 リードを検索 (最大200件)",
                loading: "検索中... お待ちください。",
                no_results: "ビジネスが見つかりません。",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "WhatsApp",
                website: "ウェブサイト",
                email: "メール"
            },
            zh: {
                ad_text: "拥有此域名？",
                ad_sale: "在GoDaddy上可用",
                placeholder_location: "城市或国家（例如：迪拜）",
                placeholder_keyword: "关键词（例如：餐厅）",
                search_btn: "🔍 搜索潜在客户（最多200个）",
                loading: "正在搜索... 请稍候。",
                no_results: "未找到企业。",
                location_label: "📍",
                phone_label: "📞",
                website_label: "🌐",
                email_label: "✉️",
                whatsapp: "WhatsApp",
                website: "网站",
                email: "电子邮件"
            }
        };

        let currentLang = localStorage.getItem('siwet_lang') || 'en';
        const langSelect = document.getElementById('langSelect');
        langSelect.value = currentLang;
        applyLanguage(currentLang);

        function switchLanguage(lang) {
            localStorage.setItem('siwet_lang', lang);
            applyLanguage(lang);
        }

        function applyLanguage(lang) {
            currentLang = lang;
            // Update HTML dir and lang
            document.documentElement.lang = lang;
            if (lang === 'ar') {
                document.body.classList.add('rtl');
                document.documentElement.dir = 'rtl';
            } else {
                document.body.classList.remove('rtl');
                document.documentElement.dir = 'ltr';
            }

            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang] && translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });

            // Re-render results if any exist, to update labels
            if (window.currentResults) {
                renderResults(window.currentResults);
            }
        }

        // ---------- Map Initialization ----------
        const map = L.map('map').setView([25.2048, 55.2708], 6); // Default to Dubai
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        let markersLayer = L.layerGroup().addTo(map);

        // ---------- Search Function ----------
        async function searchLeads() {
            const location = document.getElementById('location').value.trim();
            const keyword = document.getElementById('keyword').value.trim();
            if (!location || !keyword) {
                alert(currentLang === 'ar' ? 'املأ جميع الحقول' : 'Fill all fields');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultsGrid').innerHTML = '';
            markersLayer.clearLayers();

            try {
                // Call your Vercel API that uses SerpApi
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: `${keyword} in ${location}`,
                        location: location,   // optional: you can parse coordinates if needed
                        lang: currentLang
                    })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                window.currentResults = data; // store for language re-render
                renderResults(data);
            } catch (error) {
                console.error(error);
                document.getElementById('resultsGrid').innerHTML = `<p>${translations[currentLang].no_results}</p>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderResults(businesses) {
            const grid = document.getElementById('resultsGrid');
            if (!businesses || businesses.length === 0) {
                grid.innerHTML = `<p>${translations[currentLang].no_results}</p>`;
                return;
            }

            // Clear old markers
            markersLayer.clearLayers();
            const bounds = [];

            grid.innerHTML = businesses.map((b, index) => {
                // Extract data (adjust field names based on your SerpApi response)
                const name = b.title || b.name || 'N/A';
                const address = b.address || b.location || '';
                const phone = b.phone || '';
                const website = b.website || b.link || '';
                const email = b.email || '';
                const lat = b.gps_coordinates?.latitude || b.latitude;
                const lng = b.gps_coordinates?.longitude || b.longitude;
                const phoneClean = phone ? phone.replace(/[^0-9+]/g, '') : '';

                // Add marker to map if coordinates exist
                if (lat && lng) {
                    const marker = L.marker([lat, lng]).addTo(markersLayer);
                    marker.bindPopup(`<b>${name}</b><br>${address}`);
                    bounds.push([lat, lng]);
                }

                // Build card with current language labels
                const t = translations[currentLang];
                return `
                <div class="card">
                    <h3>${name}</h3>
                    ${address ? `<p>${t.location_label} ${address}</p>` : ''}
                    <div class="actions">
                        ${phone ? `<a href="https://wa.me/${phoneClean}" target="_blank" class="btn-wa">💬 ${t.whatsapp}</a>` : ''}
                        ${website ? `<a href="${website}" target="_blank" class="btn-web">🌐 ${t.website}</a>` : ''}
                        ${email ? `<a href="mailto:${email}" class="btn-email">✉️ ${t.email}</a>` : ''}
                    </div>
                </div>`;
            }).join('');

            // Adjust map view to fit all markers
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }
    </script>
</body>
</html>
