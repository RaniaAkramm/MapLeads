<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siwet MapLeads | Smart Business Finder with Live Map</title>
    <!-- SEO Meta Tags (English + Arabic) -->
    <meta name="description" content="Siwet MapLeads - Find businesses, leads, and contacts worldwide. Interactive map search for restaurants, shops, services. Business intelligence tool.">
    <meta name="keywords" content="business finder, map leads, siwet, leads generation, B2B leads, local business search, أداة بحث عن الأعمال, خريطة الأعمال, توليد عملاء, Firmensuche, recherche d'entreprise, 事業検索, 企业搜索">
    <meta name="author" content="Siwet MapLeads">
    <!-- Open Graph -->
    <meta property="og:title" content="Siwet MapLeads - Business Finder & Map">
    <meta property="og:description" content="Discover leads worldwide with interactive map. Professional prospecting tool.">
    <meta property="og:type" content="website">
    <!-- Leaflet CSS + JS (OpenStreetMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --bg-dark: #050a12;
            --card-bg: #0f172ad9;
            --card-solid: #111827;
            --border-glow: #1e2a3e;
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
            --whatsapp: #25D366;
            --website: #8b5cf6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
            color: var(--text-light);
            padding: 20px 24px 40px;
            min-height: 100vh;
        }

        /* animated pulse glow */
        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow);}
            70% { box-shadow: 0 0 0 8px rgba(0,229,255,0);}
            100% { box-shadow: 0 0 0 0 rgba(0,229,255,0);}
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header area */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 20px;
            border-bottom: 1px solid rgba(0,229,255,0.25);
            padding-bottom: 18px;
        }

        .logo h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* language selector */
        .lang-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(6px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #2d3a4e;
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #03060c;
            box-shadow: 0 0 8px var(--accent);
        }
        .lang-btn:hover:not(.active) {
            background: #2a3a50;
            color: white;
        }

        /* search card */
        .search-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 28px;
            margin-bottom: 28px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: var(--accent);
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,229,255,0.3);
        }
        button.primary-btn {
            background: linear-gradient(95deg, var(--accent), #00b8d4);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: #03060c;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            width: 100%;
            justify-content: center;
            letter-spacing: 0.5px;
        }
        button.primary-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--accent);
        }

        /* map container */
        .map-container {
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid #2a3c54;
            box-shadow: 0 10px 25px -5px black;
            height: 400px;
            background: #111827;
        }
        #map {
            height: 100%;
            width: 100%;
        }

        /* results header */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 24px 0 16px;
        }
        .results-count {
            background: #1e293b;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* grid cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 12px;
        }
        .card {
            background: var(--card-solid);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #253449;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            animation: softPulse 3s infinite;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 20px 30px -12px rgba(0,229,255,0.2);
        }
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card p {
            color: var(--text-dim);
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .btn-wa, .btn-web {
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-wa { background: var(--whatsapp); color: #0a0f1c; }
        .btn-web { background: var(--website); color: white; }
        .btn-wa:hover, .btn-web:hover { filter: brightness(1.1); transform: scale(0.97);}

        /* loading spinner */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #2d3a5e;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* domain ad banner */
        .domain-ad {
            margin-top: 48px;
            text-align: center;
            background: linear-gradient(120deg, #0f172a, #030712);
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid #2d4a6e;
            font-size: 0.9rem;
        }
        .domain-ad a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .domain-ad a:hover {
            text-shadow: 0 0 5px var(--accent);
            text-decoration: underline;
        }
        .footer-credit {
            text-align: center;
            margin-top: 28px;
            font-size: 0.75rem;
            color: #4b5568;
        }
        i.fa, i.far, i.fas { margin-right: 5px; }
        @media (max-width: 700px) {
            body { padding: 16px; }
            .search-card { padding: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header with language -->
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-map-marked-alt"></i> Siwet MapLeads</h1>
            <p data-i18n="tagline">Smart Business Discovery | AI-Powered Leads</p>
        </div>
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
            <button class="lang-btn" data-lang="ar">🇸🇦 عربي</button>
            <button class="lang-btn" data-lang="de">🇩🇪 DE</button>
            <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
            <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
            <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
        </div>
    </div>

    <!-- Search Area -->
    <div class="search-card">
        <div class="search-row">
            <div class="input-group">
                <label data-i18n="locationLabel"><i class="fas fa-city"></i> Location (City/Country)</label>
                <input type="text" id="locationInput" placeholder="e.g., Dubai, Paris, Tokyo" value="Dubai">
            </div>
            <div class="input-group">
                <label data-i18n="keywordLabel"><i class="fas fa-briefcase"></i> Business Keyword</label>
                <input type="text" id="keywordInput" placeholder="e.g., Restaurants, Clinics" value="Restaurants">
            </div>
        </div>
        <button class="primary-btn" id="searchBtn"><i class="fas fa-search-location"></i> <span data-i18n="searchBtn">Search Leads & Map</span></button>
    </div>

    <!-- Map Container -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- Loading + Results -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div data-i18n="loadingMsg">Scanning businesses and gathering leads up to 200 ...</div>
    </div>
    <div class="results-header">
        <h3 data-i18n="resultsTitle"><i class="fas fa-chart-line"></i> Live Leads</h3>
        <div class="results-count" id="resultCount">0 businesses found</div>
    </div>
    <div class="grid" id="resultsGrid"></div>

    <!-- Domain Sale Banner (GoDaddy) -->
    <div class="domain-ad">
        <i class="fas fa-tag"></i> <strong>🔥 Siwet.com</strong> <span data-i18n="adText">Premium domain for sale on</span> 
        <a href="https://www.godaddy.com/domainsearch/find?checkAvail=1&domainToCheck=siwet.com" target="_blank" rel="noopener">GoDaddy Auctions</a> 
        <span data-i18n="adCta">— Secure your brand identity today!</span>
    </div>
    <div class="footer-credit">
        <i class="fas fa-globe"></i> Siwet MapLeads Pro | <span data-i18n="credit">Location-based B2B Intelligence</span>
    </div>
</div>

<script>
    // ---------- MULTI-LANGUAGE DICTIONARY ----------
    const translations = {
        en: {
            tagline: "Smart Business Discovery | AI-Powered Leads",
            locationLabel: "📍 Location (City/Country)",
            keywordLabel: "🔍 Business Keyword",
            searchBtn: "Search Leads & Map",
            loadingMsg: "Scanning businesses and gathering leads up to 200 ...",
            resultsTitle: "Live Leads",
            adText: "Premium domain for sale on",
            adCta: "— Secure your brand identity today!",
            credit: "Location-based B2B Intelligence",
            phoneLabel: "Phone",
            websiteLabel: "Website",
            noResults: "No businesses found. Try different keywords or location."
        },
        ar: {
            tagline: "اكتشاف ذكي للأعمال | عملاء مدعوم بالذكاء",
            locationLabel: "📍 الموقع (مدينة/دولة)",
            keywordLabel: "🔍 كلمة البحث (نشاط تجاري)",
            searchBtn: "بحث عن عملاء و خريطة",
            loadingMsg: "جمع البيانات التجارية وعرضها على الخريطة ...",
            resultsTitle: "العملاء المحتملون",
            adText: "نطاق متميز للبيع على",
            adCta: "— احصل على هوية علامتك التجارية الآن!",
            credit: "ذكاء الأعمال المبني على الموقع",
            phoneLabel: "هاتف",
            websiteLabel: "موقع",
            noResults: "لم يتم العثور على نتائج. جرّب كلمات مختلفة."
        },
        de: {
            tagline: "Intelligente Firmensuche | KI-Leads",
            locationLabel: "📍 Standort (Stadt/Land)",
            keywordLabel: "🔍 Geschäftsbereich",
            searchBtn: "Leads & Karte durchsuchen",
            loadingMsg: "Unternehmen werden gescannt (bis zu 200) ...",
            resultsTitle: "Echtzeit-Leads",
            adText: "Premium-Domain zu verkaufen auf",
            adCta: "— Sichern Sie sich Ihre Marke!",
            credit: "Standortbasiertes B2B-Intelligence",
            phoneLabel: "Telefon",
            websiteLabel: "Webseite",
            noResults: "Keine Ergebnisse. Versuchen Sie andere Suchbegriffe."
        },
        fr: {
            tagline: "Découverte d'entreprises | Leads IA",
            locationLabel: "📍 Lieu (Ville/Pays)",
            keywordLabel: "🔍 Mot-clé métier",
            searchBtn: "Rechercher leads & carte",
            loadingMsg: "Recherche d'entreprises jusqu'à 200 ...",
            resultsTitle: "Leads en direct",
            adText: "Domaine premium à vendre sur",
            adCta: "— Obtenez votre identité de marque!",
            credit: "Intelligence B2B géolocalisée",
            phoneLabel: "Téléphone",
            websiteLabel: "Site web",
            noResults: "Aucun résultat. Essayez d'autres mots-clés."
        },
        ja: {
            tagline: "スマートビジネス検索 | AI主導リード",
            locationLabel: "📍 場所 (都市/国)",
            keywordLabel: "🔍 ビジネスキーワード",
            searchBtn: "リード検索＆マップ",
            loadingMsg: "最大200件のビジネスを収集中...",
            resultsTitle: "ライブリード",
            adText: "プレミアムドメイン販売中",
            adCta: "— ブランドアイデンティティを確保！",
            credit: "位置情報B2Bインテリジェンス",
            phoneLabel: "電話番号",
            websiteLabel: "ウェブサイト",
            noResults: "結果が見つかりません。別のキーワードで検索してください。"
        },
        zh: {
            tagline: "智能商业发现 | AI驱动线索",
            locationLabel: "📍 位置 (城市/国家)",
            keywordLabel: "🔍 商业关键词",
            searchBtn: "搜索线索与地图",
            loadingMsg: "正在收集商业数据（最多200条）...",
            resultsTitle: "实时线索",
            adText: "优质域名出售，平台：",
            adCta: "— 立即保护您的品牌！",
            credit: "基于位置的B2B情报",
            phoneLabel: "电话",
            websiteLabel: "网站",
            noResults: "未找到结果。请尝试其他关键词或地点。"
        }
    };

    let currentLang = "en";
    function updateUI(lang) {
        const t = translations[lang];
        if (!t) return;
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (t[key]) el.innerHTML = t[key];
        });
        // update placeholder texts for inputs
        const locationLabel = t.locationLabel;
        const keywordLabel = t.keywordLabel;
        // but keep placeholders friendly but we don't override actual examples.
        document.getElementById("locationInput").placeholder = (lang === "ar" ? "مثال: دبي، لندن" : (lang === "de"?"z.B. Dubai, Berlin":"e.g. Dubai, Paris"));
        document.getElementById("keywordInput").placeholder = (lang === "ar" ? "مثال: مطاعم، صيدليات" : (lang === "de"?"z.B. Restaurants, Kliniken":"e.g. Restaurants, Shops"));
        if (lang === "ar") document.body.style.fontFamily = "'Inter', 'Cairo', sans-serif";
        else document.body.style.fontFamily = "'Inter', sans-serif";
    }

    // language switcher
    const langBtns = document.querySelectorAll(".lang-btn");
    langBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            langBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentLang = btn.getAttribute("data-lang");
            updateUI(currentLang);
        });
    });
    updateUI("en");

    // ---------- MAP INIT ----------
    let map = L.map('map').setView([25.2048, 55.2708], 12); // Dubai default
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
        subdomains: 'abcd',
        maxZoom: 19,
        className: 'map-tiles'
    }).addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    // Helper: generate random business data around center
    function generateMockLeads(centerLat, centerLng, keyword, count = 35) {
        const businesses = [];
        const prefixNames = ["Elite", "Prime", "Golden", "Metro", "Express", "Modern", "City", "Royal", "Smart", "NextGen"];
        const suffixes = ["Solutions", "Center", "Hub", "Studio", "Lounge", "Place", "Corner", "Spot"];
        for (let i = 0; i < count; i++) {
            // random offset within ~6-7 km
            const latOffset = (Math.random() - 0.5) * 0.09;
            const lngOffset = (Math.random() - 0.5) * 0.09;
            const lat = centerLat + latOffset;
            const lng = centerLng + lngOffset;
            const randName = `${prefixNames[Math.floor(Math.random() * prefixNames.length)]} ${keyword} ${suffixes[Math.floor(Math.random() * suffixes.length)]}`;
            const phoneRaw = `+971${Math.floor(500000000 + Math.random() * 400000000)}`.slice(0, 14);
            const phone = phoneRaw;
            const websiteDomain = `${keyword.toLowerCase().replace(/\s/g,'')}${Math.floor(10+Math.random()*90)}.siwetdemo.com`;
            const address = `${Math.floor(1+Math.random()*200)} ${["Main St", "Business Bay", "Digital Avenue", "Innovation Road"][Math.floor(Math.random()*4)]}`;
            businesses.push({
                name: randName,
                location: address,
                phone: phone,
                website: `https://${websiteDomain}`,
                lat: lat,
                lng: lng
            });
        }
        return businesses.slice(0, 200);
    }

    // Geocoding via Nominatim
    async function geocodeLocation(locationName) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationName)}&limit=1`;
        const response = await fetch(url, {
            headers: { 'User-Agent': 'SiwetMapLeads/1.0' }
        });
        const data = await response.json();
        if (data && data.length > 0) {
            return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        } else {
            throw new Error("Location not found");
        }
    }

    // clear previous markers and grid
    function clearResults() {
        markersLayer.clearLayers();
        document.getElementById("resultsGrid").innerHTML = "";
    }

    function renderBusinesses(businesses, userLocationLatLon) {
        const grid = document.getElementById("resultsGrid");
        if (!businesses.length) {
            const noResultMsg = translations[currentLang]?.noResults || "No results found.";
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">${noResultMsg}</div>`;
            document.getElementById("resultCount").innerText = `0 ${translations[currentLang]?.resultsTitle || "businesses"}`;
            return;
        }
        document.getElementById("resultCount").innerHTML = `${businesses.length} ${currentLang === 'ar' ? 'شركة تم العثور عليها' : 'businesses found'}`;
        grid.innerHTML = businesses.map(b => `
            <div class="card">
                <h3><i class="fas fa-store"></i> ${escapeHtml(b.name)}</h3>
                <p><i class="fas fa-map-pin"></i> ${escapeHtml(b.location)}</p>
                <div class="actions">
                    ${b.phone ? `<a href="https://wa.me/${b.phone.replace(/[^0-9]/g,'')}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${translations[currentLang]?.phoneLabel || "WhatsApp"}</a>` : ''}
                    ${b.website ? `<a href="${b.website}" target="_blank" class="btn-web"><i class="fas fa-globe"></i> ${translations[currentLang]?.websiteLabel || "Website"}</a>` : ''}
                </div>
            </div>
        `).join('');
        // Add markers
        businesses.forEach(b => {
            if (b.lat && b.lng) {
                const marker = L.marker([b.lat, b.lng]).addTo(markersLayer);
                marker.bindPopup(`<b>${escapeHtml(b.name)}</b><br>📍 ${escapeHtml(b.location)}<br>${b.phone ? `<i class="fab fa-whatsapp"></i> ${b.phone}` : ''}`);
            }
        });
        if (businesses.length && businesses[0].lat) {
            const bounds = L.latLngBounds(businesses.map(b => [b.lat, b.lng]));
            map.fitBounds(bounds, { padding: [40, 40] });
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Main search flow
    async function performSearch() {
        const locationRaw = document.getElementById("locationInput").value.trim();
        const keyword = document.getElementById("keywordInput").value.trim();
        if (!locationRaw || !keyword) {
            alert(translations[currentLang]?.noResults ? "Please fill location and keyword" : "يرجى ملء جميع الحقول");
            return;
        }
        const loadingDiv = document.getElementById("loading");
        const searchBtn = document.getElementById("searchBtn");
        loadingDiv.style.display = "block";
        searchBtn.disabled = true;
        clearResults();

        try {
            // geocode location
            const coords = await geocodeLocation(locationRaw);
            // generate up to 45 unique realistic leads
            const generated = generateMockLeads(coords.lat, coords.lon, keyword, 48);
            // set each business location string more readable
            const finalBusinesses = generated.map((b, idx) => {
                return {
                    ...b,
                    location: b.location + `, ${locationRaw}`,
                    phone: b.phone,
                };
            });
            renderBusinesses(finalBusinesses, coords);
            // center map as well
            map.setView([coords.lat, coords.lon], 13);
        } catch (err) {
            console.error(err);
            alert(`Error: ${err.message}. Please check location name.`);
            document.getElementById("resultsGrid").innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px;">⚠️ Location not found. Try another city.</div>`;
        } finally {
            loadingDiv.style.display = "none";
            searchBtn.disabled = false;
        }
    }

    // Attach search event
    document.getElementById("searchBtn").addEventListener("click", performSearch);
    // initial auto load example: Dubai Restaurants
    window.addEventListener("load", () => {
        setTimeout(() => {
            performSearch();
        }, 200);
    });
</script>
</body>
</html>
